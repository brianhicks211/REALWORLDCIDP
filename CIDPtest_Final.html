<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>CIDP Clinical Needs Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <style>
        :root {
            --rwce-blue: #2563eb;
            --rwce-indigo: #3730a3;
            --rwce-slate: #0f172a;
            --rwce-soft: #eff6ff;
        }
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(59,130,246,0.10), transparent 28%),
                radial-gradient(circle at top right, rgba(99,102,241,0.12), transparent 32%),
                linear-gradient(180deg, #f8fbff 0%, #f8fafc 42%, #f1f5f9 100%);
        }
        .custom-scroll::-webkit-scrollbar { width: 7px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 999px; }
        .fade-in { animation: fadeIn 0.35s ease-out forwards; }
        .slide-up { animation: slideUp 0.42s ease-out forwards; }
        .scale-in { animation: scaleIn 0.24s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(.98); } to { opacity: 1; transform: scale(1); } }
        .glass-cmv {
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.95);
            box-shadow: 0 10px 35px rgba(15, 23, 42, 0.05);
        }
        .sidebar-shell {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(18px);
        }
        .fade-swap { transition: opacity 280ms ease, transform 280ms ease; will-change: opacity, transform; }
        .swap-hidden { opacity: 0; transform: translateY(6px); pointer-events: none; }
        .swap-visible { opacity: 1; transform: translateY(0); }
        .buffering-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(2,6,23,0.35); backdrop-filter: blur(2px); }
        .spinner { width:44px; height:44px; border-radius:9999px; border:4px solid rgba(255,255,255,0.25); border-top-color: rgba(255,255,255,0.95); animation: spin 0.9s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .group\/dl:hover .tooltip-dl { opacity: 1; transform: translateY(0); }
        .hero-panel {
            background:
                radial-gradient(circle at 15% 10%, rgba(125,211,252,0.22), transparent 30%),
                radial-gradient(circle at 85% 20%, rgba(129,140,248,0.25), transparent 36%),
                linear-gradient(135deg, #0f172a 0%, #1d4ed8 48%, #312e81 100%);
            box-shadow: 0 24px 60px rgba(30, 64, 175, 0.22);
        }
        .section-card {
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.9);
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.05);
        }
        .metric-pill {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .45rem .7rem;
            border-radius: 999px;
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.18);
            color: rgba(255,255,255,0.92);
            font-size: .78rem;
            font-weight: 700;
            letter-spacing: .01em;
        }
        .blue-glow {
            box-shadow: 0 0 0 1px rgba(59,130,246,0.14), 0 14px 35px rgba(37,99,235,0.10);
        }
        .nav-progress {
            background: linear-gradient(90deg, #2563eb 0%, #4f46e5 100%);
        }
        .choice-card { transition: all .18s ease; }
        .choice-card:hover { transform: translateY(-1px); }
        .soft-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(148,163,184,.5), transparent);
        }
        .case-fallback {
            background:
                radial-gradient(circle at 20% 20%, rgba(125,211,252,0.20), transparent 28%),
                radial-gradient(circle at 75% 20%, rgba(196,181,253,0.20), transparent 30%),
                linear-gradient(135deg, #0f172a 0%, #1e293b 55%, #111827 100%);
        }
    </style>
</head>
<body class="text-slate-900 h-screen flex overflow-hidden">

<aside class="sidebar-shell border-r border-slate-200/80 flex-shrink-0 transition-all duration-300 w-72 flex flex-col z-20 absolute md:relative h-full transform md:transform-none -translate-x-full md:translate-x-0" id="sidebar">
    <div class="p-5 border-b border-slate-100 flex justify-between items-center">
        <div>
            <div class="font-extrabold text-blue-700 flex items-center gap-2 text-xl tracking-tight">
                <span class="material-symbols-outlined">neurology</span>
                <span></span>
            </div>
            <div class="text-xs text-slate-500 mt-1 font-medium">CIDP Clinical Education Track</div>
        </div>
        <button class="md:hidden text-slate-400 hover:text-slate-600" onclick="toggleSidebar()">
            <span class="material-symbols-outlined">close</span>
        </button>

    <div class="px-4 pt-4 pb-2">
        <div class="rounded-2xl bg-slate-900 text-white p-4 blue-glow">
            <div class="text-[11px] uppercase tracking-[0.24em] text-blue-200 font-bold">Clinical Track</div>
            <div class="mt-2 text-sm text-slate-200">Structured module flow with cases, evidence, and knowledge checks.</div>
            <div class="mt-4">
                <div class="flex justify-between text-[11px] text-slate-300 mb-1 font-semibold">
                    <span>Progress</span>
                    <span id="sidebar-progress-text">1 / 6</span>
                </div>
                <div class="h-2 rounded-full bg-white/10 overflow-hidden">
                    <div id="sidebar-progress-bar" class="h-full nav-progress rounded-full" style="width:16.6%"></div>
                </div>
            </div>
        </div>
        <p class="text-[11px] text-slate-400 px-2 mt-4 mb-2 uppercase tracking-[0.22em] font-bold">Module Navigation</p>
    </div>
    <div class="p-3 space-y-6 overflow-y-auto custom-scroll flex-1">
        <div id="nav-container"></div>
    </div>
</aside>

<div class="fixed inset-0 bg-slate-950/40 z-10 hidden md:hidden" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="flex-1 flex flex-col h-full overflow-hidden relative">
<header class="sticky top-0 z-50 glass-cmv">
  <div class="w-full px-5 py-3 flex items-center justify-between gap-4">
    <div class="flex items-center gap-3 min-w-0">
      <div class="leading-tight min-w-0">
        <div class="text-base sm:text-lg font-extrabold tracking-tight uppercase whitespace-nowrap text-slate-900">
          REAL WORLD <span class="text-blue-600">CE</span>
        </div>
        <div class="text-[10px] font-semibold tracking-[0.28em] uppercase text-slate-500 mt-1">
          Featuring:
          <span class="font-extrabold text-slate-900">REAL </span>
          <span class="font-extrabold text-blue-600">DATA</span>
        </div>
      </div>
    </div>

    <div class="hidden lg:flex items-center gap-2 px-3 py-2 rounded-full bg-white/80 border border-slate-200 shadow-sm text-sm text-slate-500">
        <span class="material-symbols-outlined text-blue-600 text-[18px]">local_hospital</span>
        <span class="capitalize font-bold text-slate-900" id="breadcrumb-module">Module</span>
        <span class="material-symbols-outlined text-sm text-blue-600">chevron_right</span>
        <span id="breadcrumb-section" class="font-semibold truncate max-w-[220px]">Section</span>
    </div>

    <div class="flex items-center gap-3">
      <div class="hidden md:flex items-center gap-2 text-xs text-slate-500 font-semibold uppercase tracking-[0.18em]">
        <span id="header-step-index">01</span>
        <div class="w-10 h-px bg-slate-300"></div>
        <span id="header-step-total">06</span>
      </div>
      <button class="p-2 hover:bg-slate-100 rounded-xl text-slate-600 md:hidden" onclick="toggleSidebar()">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </div>
  </div>
</header>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 bg-transparent scroll-smooth" id="main-content"></main>
</div>

<script>
    const appData = {
        modules: {
            'cidp': {
                title: 'CIDP Track',
                color: 'blue',
                sections: [
                    { id: 'diagnosis', title: '1. Diagnostic Delays', icon: 'troubleshoot' },
                    { id: 'treatment', title: '2. Newer Options', icon: 'vaccines' },
                    { id: 'monitoring', title: '3. Objective Monitoring', icon: 'monitoring' },
                    { id: 'case-marcus', title: 'Case 1: Marcus', icon: 'person' },
                    { id: 'case-sarah', title: 'Case 2: Sarah', icon: 'person_3' },
                    { id: 'case-david', title: 'Case 3: David', icon: 'elderly' }
                ]
            }
        }
    };

    const ringClassMap = { blue: 'ring-blue-200' };
    const hoverClassMap = { blue: 'hover:border-blue-300' };
    const activeClassMap = { blue: 'bg-blue-50 text-blue-700 ring-1 ring-inset ring-blue-200 shadow-sm' };

    let activeModuleId = 'cidp';
    let activeSectionId = 'diagnosis';
    let quizStates = {};

    window.downloadMedia = async function(url, filename) {
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('Network response was not ok');
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = blobUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(blobUrl);
            document.body.removeChild(a);
        } catch (error) {
            console.warn('Direct download blocked by CORS. Opening in new tab instead.', error);
            window.open(url, '_blank');
        }
    };

    function getSectionIndex(moduleId, sectionId) {
        const module = appData.modules[moduleId];
        return module.sections.findIndex(s => s.id === sectionId);
    }

    function getSectionContent(moduleId, sectionId) {
        const sectionIndex = getSectionIndex(moduleId, sectionId) + 1;
        const totalSections = appData.modules[moduleId].sections.length;

        if (sectionId === 'diagnosis') return `
            <div class="space-y-6 max-w-4xl mx-auto slide-up">
                <section class="hero-panel rounded-[28px] p-8 md:p-10 text-white overflow-hidden relative">
                    <div class="relative z-10">
                        <div class="flex flex-wrap gap-2 mb-5">
                            <span class="metric-pill"><span class="material-symbols-outlined text-[16px]">insights</span>High misdiagnosis burden</span>
                            <span class="metric-pill"><span class="material-symbols-outlined text-[16px]">schedule</span>Delayed intervention risk</span>
                        </div>
                        <div class="max-w-2xl">
                            <div class="text-xs uppercase tracking-[0.26em] text-blue-100 font-bold mb-3">CIDP Clinical Needs Assessment</div>
                            <h1 class="text-3xl md:text-4xl font-extrabold mb-4 leading-tight">Diagnostic Delays in CIDP</h1>
                            <p class="text-blue-100/95 text-base md:text-lg leading-relaxed">Overcoming high misdiagnosis rates and fragmented workups so clinicians can recognize CIDP earlier and reduce preventable progression.</p>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mt-7 max-w-3xl">
                            <div class="rounded-2xl bg-white/10 border border-white/15 p-4">
                                <div class="text-2xl font-extrabold">68%</div>
                                <div class="text-sm text-blue-100 mt-1">Initially misdiagnosed</div>
                            </div>
                            <div class="rounded-2xl bg-white/10 border border-white/15 p-4">
                                <div class="text-2xl font-extrabold">21+ mo</div>
                                <div class="text-sm text-blue-100 mt-1">Potential delay window</div>
                            </div>
                            <div class="rounded-2xl bg-white/10 border border-white/15 p-4">
                                <div class="text-2xl font-extrabold">19</div>
                                <div class="text-sm text-blue-100 mt-1">Avg diagnostic procedures</div>
                            </div>
                        </div>
                    </div>
                </section>

                <div class="section-card rounded-3xl p-6 md:p-7">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-12 h-12 rounded-2xl bg-blue-100 text-blue-700 flex items-center justify-center"><span class="material-symbols-outlined">fact_check</span></div>
                        <div>
                            <h2 class="text-xl font-bold text-slate-900">The Clinical Gap</h2>
                            <p class="text-sm text-slate-500">Where diagnostic inconsistency undermines timely care</p>
                        </div>
                    </div>
                    <div class="prose prose-slate max-w-none text-slate-600 leading-relaxed">
                        <p class="mb-4">Timely recognition of Chronic Inflammatory Demyelinating Polyradiculoneuropathy (CIDP) remains a major hurdle. As many as <strong>68%</strong> of patients are initially misdiagnosed, leading to delays that can extend beyond 21 months.</p>
                        <div class="rounded-2xl bg-amber-50 border border-amber-200 p-5 my-6">
                            <div class="flex items-start gap-3">
                                <span class="material-symbols-outlined text-amber-600">warning</span>
                                <div>
                                    <p class="font-bold text-amber-900 mb-1">Diagnostic Fragmentation</p>
                                    <p class="text-amber-800 text-sm">Patients undergo an average of 19 diagnostic procedures. Compounding this, only 15% of neurologists report always using diagnostic guidelines.</p>
                                </div>
                            </div>
                        </div>
                        <h3 class="font-bold text-slate-900 mt-6 mb-2">Best Practice Workflow</h3>
                        <p>Diagnostic workups should prioritize <strong>electrodiagnostic nerve conduction testing</strong>, supported by ultrasound, MRI, CSF analysis, and nerve biopsy as needed to capture proximal or multifocal involvement.</p>
                    </div>
                </div>
                ${renderQuizComponent('cidp-q1', "What is the recommended primary, objective diagnostic tool for a patient who meets the clinical criteria for CIDP?", ["Magnetic Resonance Imaging (MRI)", "Cerebrospinal fluid (CSF) analysis", "Electrodiagnostic nerve conduction testing", "Diagnostic nerve biopsy"], 2, "Correct! Structured diagnostic testing should initially focus on electrodiagnostic nerve conduction testing, which can then be supported by other clinical features.")}
                ${renderFooterNav(null, ['cidp','treatment'], sectionIndex, totalSections, 'Next: Treatments')}
            </div>`;

        if (sectionId === 'treatment') return `
            <div class="space-y-6 max-w-4xl mx-auto slide-up">
                ${renderMiniHero('Integrating Newer Therapies', 'Guideline-recommended interventions often lack sequencing data for newly approved agents. Clinicians must actively integrate recent efficacy and safety findings into their treatment algorithms.', 'biotech', sectionIndex, totalSections)}
               <div class="grid grid-cols-1 mt-6 gap-4">
                 <div class="section-card rounded-3xl p-6 border-l-4 border-blue-500">
                   <h3 class="font-bold text-lg text-slate-800 mb-2">10% IVIg (Approved 2024)</h3>
                   <p class="text-sm text-slate-600 leading-relaxed">Demonstrated a 94.4% treatment response rate in the ADVANCE-CIDP 2 trial based on improvements in INCAT-recorded functional disability.</p>
                 </div>
                 <div class="section-card rounded-3xl p-6 border-l-4 border-purple-500">
                   <h3 class="font-bold text-lg text-slate-800 mb-2">Efgartigimod alfa + hyaluronidase-qvfc (Approved 2024)</h3>
                   <p class="text-sm text-slate-600 leading-relaxed">An FcRn-based subcutaneous injection that demonstrated a lower relapse rate compared to placebo. It competes with IgG to reduce their recycling.</p>
                 </div>
               </div>

               ${renderQuizComponent('cidp-q2', "Which recently approved therapeutic agent for CIDP operates as a neonatal Fc receptor (FcRn) blocker?", ["10% IVIg", "Corticosteroids", "10% SCIg + rHuPH20", "Efgartigimod alfa + hyaluronidase-qvfc"], 3, "Correct! Efgartigimod alfa works as an FcRn blocker that competes with IgG to reduce their recycling, leaving them free to be degraded in cellular lysosomes.")}
               ${renderFooterNav(['cidp','diagnosis'], ['cidp','monitoring'], sectionIndex, totalSections, 'Next: Monitoring')}
            </div>`;
        
        if (sectionId === 'monitoring') return `
            <div class="space-y-6 max-w-4xl mx-auto slide-up">
                ${renderMiniHero('Objective Monitoring Tools', 'Current practice still leans too heavily on subjective reporting. Better monitoring creates a more reliable path for titration, treatment durability, and confident clinical decisions.', 'monitor', sectionIndex, totalSections)}
                <div class="section-card rounded-3xl p-6 md:p-7">
                    <h3 class="font-semibold text-lg mb-4 text-slate-800">The Problem with Subjective Reporting</h3>
                    <p class="text-slate-600 mb-4 leading-relaxed">Standardized monitoring is severely underutilized. This poor monitoring contributes to a <strong>35% treatment discontinuation rate</strong> in the first 4 months of IVIg therapy.</p>
                    
                    <div class="bg-blue-50 border border-blue-200 rounded-2xl p-5 mt-6">
                        <h4 class="font-bold text-blue-900 mb-4">Current Practices vs. Guidelines</h4>
                        <ul class="space-y-3">
                            <li class="flex justify-between items-center text-sm border-b border-blue-100 pb-2"><span class="text-blue-800">Gait Assessment (Subjective)</span> <span class="bg-red-100 text-red-700 font-bold px-2 py-1 rounded text-xs">Used by 68%</span></li>
                            <li class="flex justify-between items-center text-sm border-b border-blue-100 pb-2"><span class="text-blue-800">Subjective Patient Reporting</span> <span class="bg-red-100 text-red-700 font-bold px-2 py-1 rounded text-xs">Used by 64%</span></li>
                            <li class="flex justify-between items-center text-sm border-b border-blue-100 pb-2"><span class="text-blue-800 font-bold">INCAT Disability Scale (Recommended)</span> <span class="bg-green-100 text-green-700 font-bold px-2 py-1 rounded text-xs">Used by only 30%</span></li>
                            <li class="flex justify-between items-center text-sm"><span class="text-blue-800 font-bold">I-RODS (Recommended)</span> <span class="bg-green-100 text-green-700 font-bold px-2 py-1 rounded text-xs">Used by only 17%</span></li>
                        </ul>
                    </div>
                </div>

                ${renderQuizComponent('cidp-q3', "Despite guidelines, what methods are most frequently used by neurologists in current practice to determine CIDP treatment response?", ["I-RODS", "INCAT disability scale", "Gait assessment & subjective reporting", "MRC manual muscle test"], 2, "Correct! 68% use gait assessment and 64% use subjective patient reporting, leading to suboptimal monitoring and high discontinuation rates.")}
                ${renderFooterNav(['cidp','treatment'], ['cidp','case-marcus'], sectionIndex, totalSections, 'Next: Cases')}
            </div>`;

        if (sectionId === 'case-marcus') return `
            <div class="space-y-6 max-w-4xl mx-auto slide-up">
                ${renderCaseHeader('Case Study 1: Marcus', 'Diagnostic Delay', 'Marcus is a 55-year-old male presenting with progressively worsening symmetrical weakness and sensory loss in his legs.', 'M', 'bg-indigo-100 text-indigo-600', sectionIndex, totalSections)}
                <div class="section-card rounded-3xl p-6">
                    ${renderClinicalVideoBlock('marcus', 'Marcus', 'assets/marcus.jpg', 'assets/marcus.mp4', "Clinical Observation: He was initially misdiagnosed with diabetic polyneuropathy. Over the next 14 months, he underwent 12 different diagnostic procedures, experiencing irreversible disease progression.", { posterMaxClass: 'max-h-[320px] mx-auto rounded-t-xl', fallbackBadge: 'Delayed referral' })}
                    <div class="space-y-3 bg-slate-50 p-5 rounded-2xl border border-slate-100 text-sm mt-6">
                        <p><strong class="text-slate-900">Diagnosis:</strong> After referral to a subspecialist, an electrodiagnostic study correctly identified demyelinating features, confirming typical CIDP.</p>
                    </div>
                </div>

                ${renderQuizComponent('quiz-marcus', "In a patient like Marcus, what is the median diagnostic delay from symptom onset to confirmed diagnosis across CIDP populations, according to recent real-world evidence?", ["2 weeks", "6.0 months", "21.3 months", "5 years"], 1, "Correct! Real-world evidence demonstrates a median diagnostic delay of 6.0 months, though it can extend up to 21.3 months in misdiagnosed cases.")}
                ${renderFooterNav(['cidp','monitoring'], ['cidp','case-sarah'], sectionIndex, totalSections, 'Next Case')}
            </div>`;

        if (sectionId === 'case-sarah') return `
            <div class="space-y-6 max-w-4xl mx-auto slide-up">
                ${renderCaseHeader('Case Study 2: Sarah', 'Misdiagnosis Override', 'Sarah is a 42-year-old female presenting with significant proximal weakness and multifocal deficits.', 'S', 'bg-pink-100 text-pink-600', sectionIndex, totalSections)}
                <div class="section-card rounded-3xl p-6">
                    ${renderClinicalVideoBlock('sarah', 'Sarah', 'https://images.unsplash.com/photo-1579684385127-1ef15d508118?auto=format&fit=crop&q=80&w=800', 'placeholder_video.mp4', "Clinical Observation: Her symptoms of symmetric weakness evolved gradually over 10 weeks. She was initially misdiagnosed with Guillain-Barré syndrome (GBS).", { posterMaxClass: 'max-h-[320px] mx-auto rounded-t-xl', fallbackBadge: 'GBS confusion' })}
                </div>
                ${renderQuizComponent('quiz-sarah', "Why was Sarah likely misdiagnosed with GBS instead of CIDP initially?", ["GBS shares overlapping clinical features with CIDP", "She had a completely normal EMG", "Proximal weakness is strictly a sign of diabetic neuropathy"], 0, "Correct! Diagnostic confusion frequently occurs with conditions that share overlapping clinical features, with GBS accounting for 28.7% of initial misdiagnoses.")}
                ${renderFooterNav(['cidp','case-marcus'], ['cidp','case-david'], sectionIndex, totalSections, 'Next Case')}
            </div>`;

        if (sectionId === 'case-david') return `
            <div class="space-y-6 max-w-4xl mx-auto slide-up">
                ${renderCaseHeader('Case Study 3: David', 'Dose Optimization', 'David is a 60-year-old male who has been receiving maintenance IVIg therapy for 6 months.', 'D', 'bg-slate-200 text-slate-600', sectionIndex, totalSections)}
                <div class="section-card rounded-3xl p-6">
                    ${renderClinicalVideoBlock('david', 'David', 'https://images.unsplash.com/photo-1505751172876-fa1923c5c528?auto=format&fit=crop&q=80&w=800', 'placeholder_video.mp4', "Clinical Observation: David wishes to discontinue therapy due to fatigue and a perceived lack of efficacy. His physician has been monitoring his progress using only subjective patient reporting.", { posterMaxClass: 'max-h-[320px] mx-auto rounded-t-xl', fallbackBadge: 'Objective reassessment needed' })}
                </div>
                ${renderQuizComponent('quiz-david', "What guideline-recommended step should the physician take to properly assess David's response before considering discontinuation?", ["Switch him immediately to daily corticosteroids", "Reassess using objective scales like I-RODS or INCAT to properly systematize dose titration", "Order an immediate diagnostic nerve biopsy"], 1, "Correct! Treatment efficacy is dose-dependent and requires individualized titration based on objective clinical response (using tools like INCAT or I-RODS), rather than subjective reporting which leads to high discontinuation.")}
                <div class="section-card rounded-3xl p-6 md:p-7 bg-gradient-to-r from-emerald-50 to-blue-50 border-emerald-200">
                    <div class="flex items-start gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-emerald-100 text-emerald-700 flex items-center justify-center"><span class="material-symbols-outlined">check_circle</span></div>
                        <div>
                            <h3 class="font-bold text-slate-900 text-lg">Module Complete</h3>
                            <p class="text-slate-600 mt-1">You have completed the CIDP Clinical Needs Assessment track covering diagnostic delay, newer treatment options, objective monitoring, and applied case interpretation.</p>
                        </div>
                    </div>
                </div>
                ${renderFooterNav(['cidp','case-sarah'], null, sectionIndex, totalSections, 'Complete Module')}
            </div>`;
        
        return '';
    }

    function renderMiniHero(title, description, icon, current, total) {
        const iconName = icon === 'biotech' ? 'biotech' : 'monitoring';
        return `
            <section class="hero-panel rounded-[28px] p-7 md:p-8 text-white overflow-hidden relative">
                <div class="flex items-start justify-between gap-4 relative z-10">
                    <div class="max-w-2xl">
                        <div class="text-xs uppercase tracking-[0.26em] text-blue-100 font-bold mb-3">Section ${String(current).padStart(2,'0')} of ${String(total).padStart(2,'0')}</div>
                        <h2 class="text-3xl font-extrabold mb-3">${title}</h2>
                        <p class="text-blue-100/95 leading-relaxed max-w-2xl">${description}</p>
                    </div>
                    <div class="hidden md:flex w-16 h-16 rounded-2xl bg-white/10 border border-white/15 items-center justify-center flex-shrink-0">
                        <span class="material-symbols-outlined text-3xl">${iconName}</span>
                    </div>
                </div>
            </section>`;
    }

    function renderCaseHeader(title, subtitle, description, initial, avatarClass, current, total) {
        return `
            <section class="hero-panel rounded-[28px] p-7 md:p-8 text-white overflow-hidden relative">
                <div class="flex flex-wrap items-start justify-between gap-4 relative z-10">
                    <div class="flex items-start gap-4 max-w-3xl">
                        <div class="w-14 h-14 rounded-2xl ${avatarClass} flex items-center justify-center text-xl font-extrabold shadow-sm flex-shrink-0">${initial}</div>
                        <div>
                            <div class="text-xs uppercase tracking-[0.26em] text-blue-100 font-bold mb-2">Section ${String(current).padStart(2,'0')} of ${String(total).padStart(2,'0')}</div>
                            <h2 class="text-3xl font-extrabold mb-1">${title}</h2>
                            <div class="text-blue-100 font-semibold mb-3">${subtitle}</div>
                            <p class="text-blue-100/95 leading-relaxed">${description}</p>
                        </div>
                    </div>
                    <span class="px-3 py-1.5 bg-white/10 border border-white/15 text-white rounded-full text-xs font-bold uppercase tracking-[0.18em]">Interactive</span>
                </div>
            </section>`;
    }

    function renderFooterNav(prev, next, current, total, nextLabel) {
        return `
            <div class="section-card rounded-3xl p-4 md:p-5">
                <div class="flex items-center justify-between gap-4 flex-wrap">
                    <div class="text-sm text-slate-500 font-medium">Section ${current} of ${total}</div>
                    <div class="flex items-center gap-3 flex-wrap">
                        ${prev ? `<button onclick="navigateTo('${prev[0]}', '${prev[1]}')" class="text-slate-500 hover:text-blue-600 font-medium flex items-center gap-2 px-3 py-2 rounded-xl hover:bg-slate-50"><span class="material-symbols-outlined">arrow_back</span> Back</button>` : `<div></div>`}
                        ${next ? `<button onclick="navigateTo('${next[0]}', '${next[1]}')" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-semibold hover:bg-blue-700 transition flex items-center gap-2 shadow-md">${nextLabel} <span class="material-symbols-outlined">arrow_forward</span></button>` : `<button class="bg-green-600 text-white px-6 py-3 rounded-xl font-semibold hover:bg-green-700 transition flex items-center gap-2 shadow-md">${nextLabel} <span class="material-symbols-outlined">check_circle</span></button>`}
                    </div>
                </div>
            </div>`;
    }

    function renderQuizComponent(id, question, options, correctIndex, explanation) {
        const state = quizStates[id] || { submitted: false, selected: null };
        const isCorrect = state.selected === correctIndex;
        let optionsHtml = options.map((opt, idx) => {
            let style = `bg-white border-slate-200 ${hoverClassMap.blue}`;
            let icon = '<div class="w-5 h-5 rounded-full border border-slate-300"></div>';
            
            if (!state.submitted && state.selected === idx) {
                style = `bg-blue-50 border-blue-500 ring-1 ring-blue-500 shadow-sm`;
                icon = `<div class="w-5 h-5 rounded-full border border-blue-500 bg-white flex items-center justify-center"><div class="w-2.5 h-2.5 rounded-full bg-blue-500"></div></div>`;
            } else if (state.submitted) {
                if (idx === correctIndex) {
                    style = "bg-green-50 border-green-200 ring-1 ring-green-500 shadow-sm";
                    icon = '<div class="w-5 h-5 rounded-full bg-green-500 border-green-500 flex items-center justify-center"><span class="material-symbols-outlined text-white text-sm">check</span></div>';
                } else if (idx === state.selected) {
                    style = "bg-red-50 border-red-200 ring-1 ring-red-500 shadow-sm";
                    icon = '<div class="w-5 h-5 rounded-full border-red-500 flex items-center justify-center"><span class="material-symbols-outlined text-red-500 text-sm">close</span></div>';
                } else {
                    style = "bg-slate-50 border-slate-200 opacity-60";
                }
            }
            const clickAttr = !state.submitted ? `onclick="selectQuizOption('${id}', ${idx})"` : '';
            return `<div ${clickAttr} class="choice-card p-4 rounded-2xl border cursor-pointer transition-all duration-200 flex items-center gap-3 mb-3 ${style}">${icon}<span class="text-sm ${state.submitted && idx === correctIndex ? 'font-bold text-green-900' : 'text-slate-700'}">${opt}</span></div>`;
        }).join('');
        
        let feedback = state.submitted ? `<div class="mt-6 p-4 rounded-2xl ${isCorrect ? "bg-green-100 text-green-900 border border-green-200" : "bg-red-50 text-red-900 border border-red-200"} animate-in fade-in"><div class="flex items-center gap-2 font-bold mb-2"><span class="material-symbols-outlined">${isCorrect ? "check_circle" : "cancel"}</span>${isCorrect ? "Correct!" : "Incorrect"}</div><p class="text-sm leading-relaxed">${explanation}</p></div>` : `<button onclick="submitQuiz('${id}', ${correctIndex})" class="mt-4 w-full py-3 rounded-xl font-bold transition-all text-white ${state.selected !== null ? `bg-blue-600 hover:bg-blue-700 shadow-md` : 'bg-slate-200 text-slate-400 cursor-not-allowed'}" ${state.selected === null ? 'disabled' : ''}>Submit Answer</button>`;
        
        return `<div class="section-card rounded-3xl p-6 md:p-7 my-6 scale-in" id="${id}"><div class="flex flex-wrap items-center gap-2 mb-4"><span class="bg-blue-100 text-blue-700 text-xs px-2.5 py-1 rounded-full uppercase tracking-[0.18em] font-bold">Knowledge Check</span><div class="soft-divider flex-1 min-w-[60px]"></div></div><h3 class="font-semibold text-slate-900 mb-4 text-lg leading-snug">${question}</h3><div>${optionsHtml}</div>${feedback}</div>`;
    }

    function renderClinicalVideoBlock(key, name, posterSrc, videoSrc, observationText, opts = {}) {
        const posterMaxClass = opts.posterMaxClass ? opts.posterMaxClass : '';
        const fallbackBadge = opts.fallbackBadge || 'Clinical insight';
        return `
<div class="my-2 rounded-3xl overflow-hidden shadow-lg border border-slate-200 relative group/media bg-white" data-clinical-video-block="1" data-cv-key="${key}">
  <div class="absolute top-3 right-3 z-20 flex gap-2 opacity-0 group-hover/media:opacity-100 transition-opacity duration-300">
      <div class="group/dl relative">
          <button type="button" onclick="event.stopPropagation(); downloadMedia('${posterSrc}', '${name}_poster.jpg')" class="bg-slate-900/60 hover:bg-blue-600 text-white p-2.5 rounded-full backdrop-blur transition-all flex items-center justify-center shadow-md border border-white/20">
              <span class="material-symbols-outlined text-sm">image</span>
          </button>
          <div class="tooltip-dl absolute -bottom-10 right-0 whitespace-nowrap bg-slate-900 text-white text-xs px-2 py-1 rounded opacity-0 translate-y-1 transition-all pointer-events-none">Download Image</div>
      </div>
      <div class="group/dl relative">
          <button type="button" onclick="event.stopPropagation(); downloadMedia('${videoSrc}', '${name}_video.mp4')" class="bg-slate-900/60 hover:bg-blue-600 text-white p-2.5 rounded-full backdrop-blur transition-all flex items-center justify-center shadow-md border border-white/20">
              <span class="material-symbols-outlined text-sm">movie</span>
          </button>
          <div class="tooltip-dl absolute -bottom-10 right-0 whitespace-nowrap bg-slate-900 text-white text-xs px-2 py-1 rounded opacity-0 translate-y-1 transition-all pointer-events-none">Download Video</div>
      </div>
  </div>

  <button type="button" class="w-full relative block bg-black group fade-swap swap-visible" data-cv-poster aria-label="Play ${name} clinical observation video">
    <img src="${posterSrc}" alt="${name}" class="w-full h-full object-cover opacity-90 group-hover:opacity-100 transition ${posterMaxClass}" />
    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
      <div class="h-16 w-16 rounded-full bg-white/88 backdrop-blur border border-white/60 shadow-lg flex items-center justify-center group-hover:scale-105 transition">
        <svg viewBox="0 0 24 24" class="w-7 h-7 text-slate-900 translate-x-[1px]" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>
      </div>
    </div>
    <div class="absolute top-4 left-4 px-3 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-[0.18em] bg-white/12 backdrop-blur border border-white/15 text-white">${fallbackBadge}</div>
    <div class="absolute bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-black/80 via-black/35 to-transparent text-left pointer-events-none">
      <div class="text-white font-semibold text-lg">Clinical Observation</div>
      <div class="text-white/80 text-sm">Click to play or launch the simulated observation view</div>
    </div>
  </button>
  
  <div class="hidden relative fade-swap swap-hidden" data-cv-wrap>
    <video class="w-full h-auto bg-black" data-cv-video preload="metadata" playsinline><source src="${videoSrc}" type="video/mp4"></video>
    <div class="hidden case-fallback text-white p-8" data-cv-fallback>
        <div class="max-w-2xl mx-auto">
            <div class="flex items-center gap-2 mb-4 text-blue-200 text-xs font-bold uppercase tracking-[0.22em]">
                <span class="material-symbols-outlined text-sm">visibility</span>
                Simulated Clinical Observation
            </div>
            <h3 class="text-2xl font-extrabold mb-3">${name} Observation Scene</h3>
            <p class="text-slate-200 leading-relaxed text-base">${observationText}</p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mt-6">
                <div class="rounded-2xl bg-white/10 border border-white/10 p-4">
                    <div class="text-xs uppercase tracking-[0.18em] text-blue-200 font-bold mb-1">Pattern</div>
                    <div class="text-sm text-white/90">Symptom progression and clinical clues are highlighted for guided review.</div>
                </div>
                <div class="rounded-2xl bg-white/10 border border-white/10 p-4">
                    <div class="text-xs uppercase tracking-[0.18em] text-blue-200 font-bold mb-1">Teaching Point</div>
                    <div class="text-sm text-white/90">Learners focus on differential reasoning instead of a blank media placeholder.</div>
                </div>
                <div class="rounded-2xl bg-white/10 border border-white/10 p-4">
                    <div class="text-xs uppercase tracking-[0.18em] text-blue-200 font-bold mb-1">Clinical Use</div>
                    <div class="text-sm text-white/90">Preserves the exact module flow when MP4 assets are unavailable.</div>
                </div>
            </div>
        </div>
    </div>
    <div class="hidden buffering-overlay pointer-events-none" data-cv-buffering aria-hidden="true"><div class="spinner"></div></div>
    <button type="button" class="hidden absolute inset-0 flex items-center justify-center bg-black/40 backdrop-blur-[1px]" data-cv-replay>
      <div class="flex flex-col items-center gap-3">
        <div class="h-16 w-16 rounded-full bg-white/90 border border-white/70 shadow-lg flex items-center justify-center"><span class="material-symbols-outlined text-slate-900 text-4xl">replay</span></div>
        <div class="text-white font-semibold">Replay</div>
      </div>
    </button>
    <div class="bg-slate-900 text-white p-6 text-center">
      <h3 class="font-semibold text-xl mb-3">Clinical Observation</h3>
      <p class="text-slate-300 max-w-2xl mx-auto leading-relaxed text-lg">${observationText}</p>
    </div>
  </div>
</div>`;
    }

    function initClinicalVideos() {
        const blocks = document.querySelectorAll('[data-clinical-video-block="1"]');
        if (!blocks.length) return;
        const isHoverDesktop = window.matchMedia && window.matchMedia('(hover:hover) and (pointer:fine)').matches;
        blocks.forEach(block => {
            const posterBtn = block.querySelector('[data-cv-poster]');
            const wrap = block.querySelector('[data-cv-wrap]');
            const video = block.querySelector('[data-cv-video]');
            const buffering = block.querySelector('[data-cv-buffering]');
            const replay = block.querySelector('[data-cv-replay]');
            const fallback = block.querySelector('[data-cv-fallback]');
            if (!posterBtn || !wrap || !video) return;

            if (isHoverDesktop) {
                block.addEventListener('mouseenter', () => { if (!video.dataset.fallbackActive) video.setAttribute('controls', ''); });
                block.addEventListener('mouseleave', () => { if (!video.dataset.fallbackActive) video.removeAttribute('controls'); });
            } else {
                video.setAttribute('controls', '');
            }

            const showVideoWrap = () => {
                posterBtn.classList.add('swap-hidden');
                posterBtn.classList.remove('swap-visible');
                posterBtn.disabled = true;
                wrap.classList.remove('hidden');
                requestAnimationFrame(() => {
                    wrap.classList.remove('swap-hidden');
                    wrap.classList.add('swap-visible');
                });
                wrap.scrollIntoView({ behavior: 'smooth', block: 'center' });
            };

            const activateFallback = () => {
                video.dataset.fallbackActive = '1';
                video.classList.add('hidden');
                if (buffering) buffering.classList.add('hidden');
                if (fallback) fallback.classList.remove('hidden');
                if (replay) replay.classList.add('hidden');
            };

            posterBtn.addEventListener('click', () => {
                showVideoWrap();
                const attempt = video.play();
                if (attempt && typeof attempt.then === 'function') {
                    attempt.catch(() => activateFallback());
                }
            });

            if (replay) {
                replay.addEventListener('click', () => {
                    replay.classList.add('hidden');
                    try { video.currentTime = 0; } catch(e) {}
                    const p = video.play();
                    if (p && typeof p.then === 'function') p.catch(() => activateFallback());
                });
            }

            const showBuffer = () => buffering && !video.dataset.fallbackActive && buffering.classList.remove('hidden');
            const hideBuffer = () => buffering && buffering.classList.add('hidden');
            video.addEventListener('waiting', showBuffer);
            video.addEventListener('stalled', showBuffer);
            video.addEventListener('playing', hideBuffer);
            video.addEventListener('canplay', hideBuffer);
            video.addEventListener('pause', hideBuffer);
            video.addEventListener('ended', () => {
                hideBuffer();
                if (replay && !video.dataset.fallbackActive) replay.classList.remove('hidden');
            });
            video.addEventListener('error', activateFallback);
        });
    }

    function updateProgressUI() {
        const module = appData.modules[activeModuleId];
        const currentIndex = getSectionIndex(activeModuleId, activeSectionId) + 1;
        const total = module.sections.length;
        const percent = Math.max(0, Math.min(100, (currentIndex / total) * 100));
        document.getElementById('sidebar-progress-text').textContent = `${currentIndex} / ${total}`;
        document.getElementById('sidebar-progress-bar').style.width = `${percent}%`;
        document.getElementById('header-step-index').textContent = String(currentIndex).padStart(2,'0');
        document.getElementById('header-step-total').textContent = String(total).padStart(2,'0');
    }

    function renderSidebar() {
        const container = document.getElementById('nav-container');
        let html = '';
        for (const modKey in appData.modules) {
            const module = appData.modules[modKey];
            const activeClassColor = activeClassMap[module.color] || activeClassMap.blue;
            html += `<div class="mb-6"><h3 class="text-xs font-bold text-slate-400 uppercase tracking-[0.18em] mb-2 px-3">${module.title}</h3><div class="space-y-1.5">`;
            module.sections.forEach(section => {
                const isActive = activeModuleId === modKey && activeSectionId === section.id;
                const btnClass = isActive ? `${activeClassColor} font-semibold` : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900';
                html += `<button onclick="navigateTo('${modKey}', '${section.id}')" class="w-full text-left px-3 py-3 rounded-2xl text-sm flex items-center gap-3 transition-all ${btnClass}"><span class="material-symbols-outlined text-[18px] opacity-70">${section.icon}</span><span class="flex-1">${section.title}</span></button>`;
            });
            html += `</div></div>`;
        }
        container.innerHTML = html;
    }

    function renderMainContent() {
        const module = appData.modules[activeModuleId];
        const section = module.sections.find(s => s.id === activeSectionId);
        document.getElementById('breadcrumb-module').textContent = module.title;
        document.getElementById('breadcrumb-section').textContent = section.title;
        const contentContainer = document.getElementById('main-content');
        contentContainer.innerHTML = getSectionContent(activeModuleId, activeSectionId);
        contentContainer.scrollTop = 0;
        renderSidebar();
        updateProgressUI();
        initClinicalVideos();
        if (window.innerWidth < 768) {
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.add('hidden');
        }
    }

    function navigateTo(modId, secId) {
        activeModuleId = modId;
        activeSectionId = secId;
        renderMainContent();
    }
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        if (sidebar.classList.contains('-translate-x-full')) {
            sidebar.classList.remove('-translate-x-full');
            overlay.classList.remove('hidden');
        } else {
            sidebar.classList.add('-translate-x-full');
            overlay.classList.add('hidden');
        }
    }
    
    window.selectQuizOption = function(qid, idx) {
        if (!quizStates[qid]) quizStates[qid] = { submitted: false };
        quizStates[qid].selected = idx;
        renderMainContent();
    }
    window.submitQuiz = function(qid) {
        if (!quizStates[qid]) return;
        quizStates[qid].submitted = true;
        renderMainContent();
    }
    
    document.addEventListener('DOMContentLoaded', () => { renderMainContent(); });
</script>

</body>
</html>
